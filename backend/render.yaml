services:
  - type: web
    name: zyntra-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/products
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        value: https://zyntra-5wo1.onrender.com/api/payments/redirect
      - key: CORS_ALLOWED_ORIGINS
        sync: false
