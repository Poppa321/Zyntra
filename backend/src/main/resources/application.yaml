spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000
      max-lifetime: 300000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.default_batch_fetch_size: 20
  flyway:
    enabled: true
    baseline-on-migrate: false
  servlet:
    multipart:
      max-file-size: 4MB
      max-request-size: 4MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

zyntra:
  cors:
    # Defaults cover local web dev only — set CORS_ALLOWED_ORIGINS in prod
    # (comma-separated, e.g. "https://app.zyntra.dev,https://*.zyntra.dev").
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://127.0.0.1:8081}
  jwt:
    secret: ${JWT_SECRET}
    expiry-minutes: 1440
  google:
    # Comma-separated Web/iOS/Android OAuth client IDs from Google Cloud Console
    # — the ID token's "aud" claim must match one of these, or the token is
    # rejected. Left blank, Google sign-in is rejected outright rather than
    # skipping the audience check.
    client-id: ${GOOGLE_CLIENT_ID:}
  paystack:
    secret-key: ${PAYSTACK_SECRET_KEY}
    base-url: https://api.paystack.co
    # Must be http(s) — Paystack's hosted checkout won't reliably redirect to a
    # bare custom scheme. PaymentRedirectController bridges from here into the
    # app's zyntra://payment/callback deep link.
    callback-url: ${PAYSTACK_CALLBACK_URL:https://zyntra-5wo1.onrender.com/api/payments/redirect}

server:
  port: ${PORT:8080}
